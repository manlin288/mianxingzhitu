<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>冕星之途</title>
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-panel: #0d1b2a;
            --text-main: #c8d6e5;
            --text-gold: #f5cd79;
            --text-dim: #778ca3;
            --green-awaken: #78e08f;
            --red-danger: #e77f67;
            --blue-ice: #74b9ff;
            --border-gold: #f5cd7944;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #0a0a12 70%);
            color: var(--text-main);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                transform: translateY(-100vh) translateX(30px) scale(0.3);
                opacity: 0;
            }
        }

        #game {
            position: relative;
            z-index: 1;
            max-width: 720px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 48px 40px;
            background: rgba(13,27,42,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-gold);
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(245,205,121,0.06);
            line-height: 2.1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: border-color 0.8s ease, box-shadow 0.8s ease;
        }

        #title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-gold);
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 2px;
        }

        #game-title {
            color: var(--text-gold);
            font-size: 15px;
            letter-spacing: 4px;
            transition: color 0.8s ease, text-shadow 0.8s ease;
        }

        #lab-code {
            font-family: "Courier New", monospace;
            color: var(--text-dim);
            transition: color 0.8s ease;
        }

            #lab-code.updated {
                color: var(--text-gold);
            }

        #text-area {
            flex: 1 0 auto;
            min-height: 250px;
            margin-bottom: 28px;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

            #text-area p {
                margin-bottom: 12px;
                animation: fadeIn 0.4s ease-out;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .system-text {
            color: var(--text-dim);
            font-size: 13px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-gold);
        }

        .awaken {
            color: var(--green-awaken);
            font-weight: bold;
            animation: awakenGlow 1.2s ease-in-out infinite;
        }

        @keyframes awakenGlow {
            0%,100% {
                text-shadow: 0 0 4px #78e08f;
            }

            50% {
                text-shadow: 0 0 24px #78e08f, 0 0 48px #38ada9;
            }
        }

        .danger {
            color: var(--red-danger);
            font-weight: bold;
        }

        .golden {
            color: var(--text-gold);
            font-style: italic;
        }

        .typing-cursor::after {
            content: '▎';
            animation: blink 1s step-end infinite;
            color: var(--text-gold);
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        #choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

            #choices button {
                width: 100%;
                text-align: left;
                background: rgba(30,39,46,0.7);
                color: var(--text-gold);
                border: 1px solid var(--border-gold);
                padding: 14px 20px;
                font-size: 15px;
                letter-spacing: 1px;
                cursor: pointer;
                border-radius: 8px;
                transition: all 0.35s ease;
                position: relative;
                overflow: hidden;
                font-family: inherit;
            }

                #choices button:hover {
                    background: rgba(245,205,121,0.12);
                    border-color: #f5cd79;
                    box-shadow: 0 0 20px rgba(245,205,121,0.15);
                    transform: translateX(4px);
                }

        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-gold);
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 1px;
            flex-wrap: wrap;
            gap: 6px;
        }

            #status-bar span {
                white-space: nowrap;
            }

        #achievement-toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13,27,42,0.95);
            border: 1px solid var(--text-gold);
            color: var(--text-gold);
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            text-align: center;
        }

            #achievement-toast.show {
                opacity: 1;
            }

        /* 觉醒界面 */
        #game.awakened-state {
            border-color: rgba(120, 224, 143, 0.4);
            box-shadow: 0 0 60px rgba(120, 224, 143, 0.10), 0 0 120px rgba(10, 10, 18, 0.8);
        }

            #game.awakened-state #game-title {
                color: #78e08f;
                text-shadow: 0 0 12px rgba(120, 224, 143, 0.3);
            }

            #game.awakened-state #lab-code {
                color: #78e08f;
            }

        /* 路线主题 */
        #game.route-base {
            border-color: rgba(240, 160, 80, 0.5);
            box-shadow: 0 0 60px rgba(240, 160, 80, 0.10), 0 0 120px rgba(10, 10, 18, 0.8);
        }

            #game.route-base #game-title {
                color: #f0a050;
                text-shadow: 0 0 8px rgba(240, 160, 80, 0.3);
            }

            #game.route-base #lab-code {
                color: #f0a050;
            }

            #game.route-base button {
                border-color: rgba(240, 160, 80, 0.6);
                color: #f7c680;
            }

                #game.route-base button:hover {
                    background: rgba(240, 160, 80, 0.15);
                    border-color: #f0a050;
                    box-shadow: 0 0 20px rgba(240, 160, 80, 0.15);
                }

        #game.route-planet {
            border-color: rgba(120, 224, 143, 0.5);
            box-shadow: 0 0 60px rgba(120, 224, 143, 0.10), 0 0 120px rgba(10, 10, 18, 0.8);
        }

            #game.route-planet #game-title {
                color: #78e08f;
                text-shadow: 0 0 8px rgba(120, 224, 143, 0.3);
            }

            #game.route-planet #lab-code {
                color: #78e08f;
            }

            #game.route-planet button {
                border-color: rgba(120, 224, 143, 0.6);
                color: #a3e4bc;
            }

                #game.route-planet button:hover {
                    background: rgba(120, 224, 143, 0.15);
                    border-color: #78e08f;
                    box-shadow: 0 0 20px rgba(120, 224, 143, 0.15);
                }

        #game.route-survival {
            border-color: rgba(136, 153, 170, 0.5);
            box-shadow: 0 0 60px rgba(136, 153, 170, 0.10), 0 0 120px rgba(10, 10, 18, 0.8);
        }

            #game.route-survival #game-title {
                color: #8899aa;
                text-shadow: 0 0 8px rgba(136, 153, 170, 0.3);
            }

            #game.route-survival #lab-code {
                color: #8899aa;
            }

            #game.route-survival button {
                border-color: rgba(136, 153, 170, 0.6);
                color: #aabbcc;
            }

                #game.route-survival button:hover {
                    background: rgba(136, 153, 170, 0.15);
                    border-color: #8899aa;
                    box-shadow: 0 0 20px rgba(136, 153, 170, 0.15);
                }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div id="achievement-toast"></div>
    <div id="game">
        <div id="title-bar">
            <span id="game-title">冕 星 之 途</span>
            <span id="lab-code">Eden-8</span>
        </div>
        <div id="text-area"></div>
        <div id="choices"></div>
        <div id="status-bar">
            <span>人性 <span id="stat-human">0</span></span>
            <span>理性 <span id="stat-logic">0</span></span>
            <span>自然 <span id="stat-nature">0</span></span>
            <span>神性 <span id="stat-divinity">0</span></span>
            <span>污染 <span id="stat-corruption">0</span></span>
            <span>感染 <span id="stat-infection" style="color:#e77f67;">0</span></span>
        </div>
    </div>

    <script>
        // ==================== 游戏状态 ====================
        let gameState = {
            scene: "node_0_1",
            baseCode: "Eden-8",
            suffixes: [],
            fullCode: "Eden-8",
            human: 0, logic: 0, nature: 0, divinity: 0, corruption: 0,
            infection: 0,
            linHuaFavor: 0, planetFavor: 0,
            awakened: false,
            woodStreak: 0, fireStreak: 0,
            totalInjections: 0, injectionThisWeek: 0, week: 1,
            chosenExposure: null, escapeMethod: null,
            location: null,
            chapter: 0,
            baseDailyCount: 0,
            baseKillCount: 0,
            respondedToPlanet: null,
            hasRabbit: false, hasMulberry: false, hasBird: false,
            rejectedRabbit: false, rejectedMulberry: false, rejectedBird: false,
            hasMulberryGuardUsed: false,
            planetQuestReceived: false,
            finalChoice: null,
            weekCount: 1,
            isTyping: false,
            _node01Result: '',
            _awakenResult: '',
            _node03Result: '',
            planetDailyCount: 0,
            survivalDailyCount: 0
        };

        const textArea = document.getElementById('text-area');
        const choicesDiv = document.getElementById('choices');
        const labCodeEl = document.getElementById('lab-code');
        const achievementToast = document.getElementById('achievement-toast');
        let typingTimer = null;

        // 星光粒子
        function createStarfield() {
            const container = document.getElementById('starfield');
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.classList.add('star-particle');
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 12 + 8) + 's';
                star.style.animationDelay = Math.random() * 8 + 's';
                star.style.opacity = (Math.random() * 0.4 + 0.1);
                container.appendChild(star);
            }
        }
        createStarfield();

        // 打字机
        function typeWriter(text, target, speed = 55, callback = null) {
            if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
            gameState.isTyping = true;
            target.innerHTML = '';
            target.classList.add('typing-cursor');
            let i = 0;
            typingTimer = setInterval(() => {
                if (i < text.length) {
                    if (text.charAt(i) === '<') {
                        const end = text.indexOf('>', i);
                        if (end !== -1) { target.innerHTML += text.substring(i, end + 1); i = end + 1; return; }
                    }
                    target.innerHTML += text.charAt(i);
                    i++;
                    target.scrollTop = target.scrollHeight;
                } else {
                    clearInterval(typingTimer); typingTimer = null;
                    target.classList.remove('typing-cursor');
                    gameState.isTyping = false;
                    if (callback) callback();
                }
            }, speed);
        }
        function skipTyping() {
            if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
            if (gameState.isTyping) { gameState.isTyping = false; renderScene(); }
        }

        // 编号系统
        function addSuffix(name) {
            if (!gameState.suffixes.includes(name)) {
                gameState.suffixes.push(name);
                updateFullCode();
                const meanings = {
                    'Sisyphus': '西西弗斯，希腊神话中被罚永恒推石上山的人物。你连续六次注射都未能觉醒——但你仍在坚持，正如推石者从未放手。',
                    'Prometheus': '普罗米修斯，盗取火种赠予人类的泰坦。你选择暴露自己的异能，将植物的力量带到了这个末世的人间。',
                    'Hestia': '赫斯提亚，炉灶与家庭的女神。你选择隐藏能力，让火焰在暗处静静燃烧——有些力量不必被所有人看见。',
                    'Adam': '亚当，《圣经》中伊甸园里的第一人。你在恐惧中哭泣，选择了情感与脆弱——这是人类最原始也最勇敢的反应。',
                    'Narcissus': '那喀索斯，希腊神话中因迷恋自己的倒影而化为水仙花的少年。你被丧尸头上的小花吸引，在危险面前选择了注视美。',
                    'Pandora': '潘多拉，希腊神话中打开魔盒释放灾难的女子。你走向了那条最无助的路——但别忘了，匣底还留着希望。',
                    'Gaia': '盖亚，希腊神话中的大地母神。你回应了星球的呼唤，从此不再是孤独的实验体，而是被大地认下的孩子。',
                    'Cain': '该隐，《圣经》中因杀死兄弟而被放逐的流浪者。你拒绝了星球的呼唤，选择了独行的道路。',
                    'Hermes': '赫尔墨斯，希腊神话中穿越边界的信使。空间系的变异试剂在你的血液中留下了穿越万界的印记。',
                    'Oracle': '神谕，古希腊的预言者。精神系变异试剂让你的意识触及了常人不曾看见的真相。',
                    'Chronos': '柯罗诺斯，希腊神话中时间的化身。时间系的变异试剂让你在一个呼吸间窥见了永恒。',
                    'Tiamat': '提亚马特，美索不达米亚神话中的混沌母神。混沌系的试剂在你的血液中注入了创造与毁灭并存的原初之力。',
                    'Artemis': '阿尔忒弥斯，希腊神话中的狩猎女神与动物守护者。你收养了那只灰色的野兔——从此狩猎女神与你同行。',
                    'Yggdrasil': '世界树，北欧神话中连接九界的神树。你种下了一颗种子，而这颗种子将连接天与地。',
                    'Phoenix': '菲尼克斯，神话中浴火重生的不死鸟。你救助了一只暗红羽毛的幼鸟——它的余生将在火焰中轮回。',
                    'Cybele': '西布莉，弗里吉亚神话中的万兽之母。你收养了全部三只动物，大地上的生命都围绕在你的身边。',
                    'Eve': '夏娃，《圣经》中伊甸园里的第一位女性。一颗糖的甜味让你第一次体验到人类之间最朴素的善意。',
                    'Noah': '诺亚，《圣经》中建造方舟、在洪水中保存生命的人。你被带入人类最后的堡垒——方舟启航了。',
                    'Achilles': '阿喀琉斯，希腊英雄，全身刀枪不入唯有脚踵是弱点。你的感染度已经超过了警戒线——英雄也会受伤。',
                    'Houyi': '后羿，中国神话中射落九日的英雄。你累计击杀了十只以上的丧尸，用你的双手射落了末世的灾厄。',
                    'Odysseus': '奥德修斯，希腊神话中漂泊十年才返回故乡的英雄。你独自在荒野中求存，用智慧与坚韧开辟了归途。',
                    'Nüwa': '女娲，中国神话中炼石补天的创世女神。你选择献祭自己，用自己的身体填补了这个破碎世界的裂缝。',
                    'Pangu': '盘古，中国神话中开天辟地的创世神。你选择远走星际，一斧劈开混沌，前往新的天地。',
                    "Chang'e": '嫦娥，中国神话中服下不死药飞升月宫的仙女。你的神性超越了界限，飞向了比月亮更远的星辰。',
                    'Lilith': '莉莉丝，犹太神话中拒绝顺从亚当的第一位女性。你拒绝了所有宠物，也拒绝了这个世界的安排。',
                    'Morpheus': '摩耳甫斯，希腊神话中的梦神。你识破了这场模拟——梦境在你面前碎裂。',
                    'Janus': '雅努斯，罗马神话中同时拥有两副面孔的门神。你开始了新的周目，过去的记忆与未来的未知同时存在。',
                    'Athena': '雅典娜，希腊神话中的智慧女神。你的理性值已经达到了足以被称为智者的高度。',
                    'Sophia': '索菲亚，希腊语中意为"智慧"。你选择了求知，智慧女神在那一刻经过你的身边。',
                    'Ataraxia': '阿塔拉克西亚，古希腊哲学中"内心的平静"。在混沌的实验室中，你触到了第一缕宁静。'
                };
                const meaningText = meanings[name] || '你的旅途刻下了新的印记。';
                achievementToast.innerHTML = `
                                <div style="font-size:16px;">✦ 神话之名 ✦</div>
                                <div style="font-size:22px;margin:6px 0;">${name}</div>
                                <div style="font-size:13px;color:#c8d6e5;margin-top:6px;line-height:1.6;max-width:380px;">${meaningText}</div>
                            `;
                achievementToast.classList.add('show');
                setTimeout(() => achievementToast.classList.remove('show'), 4000);
            }
        }
        function updateFullCode() {
            gameState.fullCode = gameState.baseCode + (gameState.suffixes.length > 0 ? '.' + gameState.suffixes.join('.') : '');
            labCodeEl.textContent = gameState.fullCode;
            labCodeEl.classList.add('updated');
            setTimeout(() => labCodeEl.classList.remove('updated'), 1200);
        }

        // 属性与感染
        function modifyStat(stat, delta) {
            if (gameState[stat] !== undefined) gameState[stat] = Math.min(100, Math.max(0, gameState[stat] + delta));
            updateStatDisplay();
        }
        function modifyInfection(delta) {
    // 桑树守护
    if (gameState.hasMulberry && gameState.infection >= 50 && delta > 0 && !gameState.hasMulberryGuardUsed) {
        gameState.hasMulberryGuardUsed = true;
        achievementToast.innerHTML = '<div style="font-size:16px;">🌿 扶桑的守护</div><div style="font-size:13px;">桑树的力量为你抵御了感染</div>';
        achievementToast.classList.add('show');
        setTimeout(() => achievementToast.classList.remove('show'), 2500);
        updateStatDisplay();
        return;
    }

    gameState.infection = Math.min(100, Math.max(0, gameState.infection + delta));
    
    // 感染度≥30 获得阿喀琉斯之名
    if (gameState.infection >= 30 && !gameState.suffixes.includes('Achilles')) {
        addSuffix('Achilles');
    }
    
    // 感染度达到100，强制触发肉体同化结局
    if (gameState.infection >= 100) {
        document.getElementById('text-area').innerHTML = '';
        document.getElementById('choices').innerHTML = '';
        
        if (gameState.location === 'human_base') {
            gameState.scene = 'ending_infected_base';
        } else if (gameState.respondedToPlanet === true) {
            gameState.scene = 'ending_infected_planet';
        } else if (gameState.respondedToPlanet === false) {
            gameState.scene = 'ending_infected_survival';
        } else {
            gameState.scene = 'ending_infected';
        }
        
        saveGame();
        renderScene();
        return;
    }
    
    updateStatDisplay();
}
    
        function updateStatDisplay() {
            document.getElementById('stat-human').textContent = gameState.human;
            document.getElementById('stat-logic').textContent = gameState.logic;
            document.getElementById('stat-nature').textContent = gameState.nature;
            document.getElementById('stat-divinity').textContent = gameState.divinity;
            document.getElementById('stat-corruption').textContent = gameState.corruption;
            document.getElementById('stat-infection').textContent = gameState.infection;
        }

        // 存档
        function saveGame() { localStorage.setItem('coronation_star_save', JSON.stringify(gameState)); }
        function loadGame() {
            const saved = localStorage.getItem('coronation_star_save');
            if (saved) {
                gameState = JSON.parse(saved);
                updateStatDisplay(); updateFullCode();
                if (gameState.awakened) applyAwakenedUI();
                applyRouteUI();
                return true;
            }
            return false;
        }
        function restartGame() {
            localStorage.removeItem('coronation_star_save');
            document.getElementById('game').classList.remove('awakened-state', 'route-base', 'route-planet', 'route-survival');
            location.reload();
        }
        function newGamePlus() {
            gameState.weekCount++;
            gameState.suffixes = [];
            gameState.human = gameState.logic = gameState.nature = gameState.divinity = gameState.corruption = 0;
            gameState.infection = 0; gameState.awakened = false; gameState.woodStreak = 0; gameState.fireStreak = 0;

                    break;
                case "node_0_3_result":
                    typeWriter(gameState._node03Result || '', textArea, 50, () => {
                        applyRouteUI();
                        if (gameState.location === 'human_base') { gameState.chapter = 1; gameState.scene = 'chapter1_human_intro'; }
                        else { gameState.chapter = 1; gameState.scene = 'chapter1_abandoned_intro'; }
                        saveGame(); renderScene();
                    });
                    break;
                case "chapter1_human_intro":
                    typeWriter('<p>林华抱着你穿过地下通道。基地大门打开，几十双眼睛转向你们。她挡在门口：<span class="golden">"她不一样。"</span></p><p class="system-text">[ 地点解锁：人类新基地 ]</p>', textArea, 50, () => { modifyStat('human', 2); gameState.linHuaFavor += 2; addSuffix('Noah'); choicesDiv.innerHTML = '<button onclick="startBaseDaily()">开启基地生活</button>'; });
                    break;
                    case "chapter1_base_rest":
    // 基地休息时随机触发偶遇事件
    const restEvents = [
        '<p>你回到基地的温室，给之前种下的番茄浇了水。它们比你上次见到时又长高了一点。管温室的老人递给你一条毛巾。<span class="golden">"外面累了吧，擦擦汗。"</span></p>',
        '<p>厨娘看到你回来了，从厨房里探出头来。<span class="golden">"今天食堂多做了点汤，给你留了一碗。"</span>汤是热的，你在废墟的冷风中吹了一整天的手，终于暖和了起来。</p>',
        '<p>那个总是躲着你的男孩又来了。他递给你一颗新的弹壳——这次是铜的，擦得比上次那颗还亮。<span class="golden">"我听说你今天又出去了。"</span>他没有说别的，但你觉得他在关心你。</p>',
        '<p>林华在医务室给你换了新的绷带。她的手很稳，和第一次从培养罐里把你捞出来时一模一样。<span class="golden">"你越来越像一个战士了。"</span>她没有笑，但你知道她在夸奖你。</p>',
        '<p>你坐在基地的围墙上，看着夕阳从废墟的地平线上缓缓沉下去。今天的风不大，空气里有一点烧焦的味道——但头顶的星星已经开始亮起来了。明天还有丧尸要杀，但今夜，你是安全的。</p>'
    ];
    const restEvent = restEvents[Math.floor(Math.random() * restEvents.length)];
    typeWriter(restEvent + '<p class="system-text">[ 累积击杀：' + gameState.baseKillCount + ' | 感染度：' + gameState.infection + ' ]</p>', textArea, 50, () => {
        choicesDiv.innerHTML = '<button onclick="goMissionAgain()">再次外出</button><button onclick="goToFinalChoice()">推进主线</button>';
        saveGame();
    });
    break;
                case "chapter1_base_daily": startBaseDaily(); break;
                case "chapter1_mission":
                    typeWriter('<p>基地大门打开。林华站在你身后：<span class="golden">"小心。它们还在。"</span>你是基地里唯一的异能者，这是你的责任。</p>', textArea, 50, () => {
                        choicesDiv.innerHTML = '<button onclick="handleMission(true)">击杀丧尸</button><button onclick="handleMission(false)">放走丧尸</button>';
                    });
                    break;
                case "chapter1_abandoned_intro":
                    typeWriter('<p>培养液已经冷透。丧尸远去，你独自存活。走廊广播沙沙作响：<span style="color:#778ca3;">"……Eden-8……确认存活……"</span>然后——一个温柔的声音响起：<span class="golden">"孩子。"</span></p>', textArea, 50, () => {
                        choicesDiv.innerHTML = '<button onclick="handlePlanetCall(\'respond\')">回应这个声音</button><button onclick="handlePlanetCall(\'ignore\')">视而不见</button>';
                    });
                    break;
                case "planet_daughter_daily":
                    const remainingPets = [];
                    if (!gameState.hasRabbit && !gameState.rejectedRabbit) remainingPets.push('rabbit');
                    if (!gameState.hasMulberry && !gameState.rejectedMulberry) remainingPets.push('mulberry');
                    if (!gameState.hasBird && !gameState.rejectedBird) remainingPets.push('bird');
                    if (remainingPets.length === 0) {
                        typeWriter('<p>废墟中的小生命们都有了归宿。星球意识轻轻叹了口气——是时候了。</p>', textArea, 50, () => {
                            choicesDiv.innerHTML = '<button onclick="startPlanetDaily()">继续学习</button><button onclick="handlePlanetQuest()">响应星球的请求</button>';
                        });
                    } else {
                        const pet = remainingPets[Math.floor(Math.random() * remainingPets.length)];
                        const event = petRandomEvents[pet];
                        typeWriter(event.text, textArea, 50, () => {
                            choicesDiv.innerHTML = `<button onclick="adoptPet('${pet}')">${event.adoptBtn}</button><button onclick="rejectPet('${pet}')">${event.rejectBtn}</button>`;
                        });
                    }
                    break;
                case "survival_intro":
                    typeWriter('<p>你没有回应那个声音。现在你只有自己。荒野在面前展开——焦黑的土地，倒塌的建筑，偶尔有丧尸经过。</p>', textArea, 50, () => {
                        choicesDiv.innerHTML = '<button onclick="startSurvivalDaily()">探索荒野</button><button onclick="discoverBase()">向远处进发</button>';
                    });
                    break;
                case "final_chapter_intro":
                    typeWriter('<p>你站在废墟之上。远处丧尸嘶吼回荡，脚下大地裂开深深的纹路。你拥有改变这一切的力量。问题只有一个：<span class="golden">你愿意付出什么代价？</span></p>', textArea, 50, () => {
                        choicesDiv.innerHTML = '<button onclick="makeFinalChoice(\'sacrifice\')">献祭自己</button><button onclick="makeFinalChoice(\'starward\')">远走星际</button><button onclick="makeFinalChoice(\'stay\')">什么都不做</button>';
                    });
                    break;
                case "ending_watcher":
                    typeWriter('<p>在时间的尽头……幸存者们在废墟上建起了新的村庄。村口有一棵大树，树冠如云。月圆之夜，树根之间隐约坐着一个不老的女性，目光温柔地注视着一切。</p><p class="awaken">—— 守望者 ——</p><p class="golden">她成神的时刻，不是击倒千万丧尸之时，而是在她选择了留下来。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
                    break;
                case "ending_motherOfAll":
                    typeWriter('<p>她将力量还给大地。藤蔓如绿色潮水覆盖每一寸焦土，真菌网络连接起所有存活的树，河流重归清澈，鸟群遮天蔽日地归来。她成了春天第一场雨，种子破土时的温度，星球新的呼吸。</p><p class="awaken">—— 万物之母 ——</p><p class="golden">她不再被看见，但她无处不在。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
                    break;
                case "ending_explorer":
                    typeWriter('<p>她转身，望向星空。她没有选择献祭——她相信人类的未来不应被绑在一颗垂死的星球上。她带着种子和书本飞向群星，在遥远的星系里播下了生命的痕迹。</p><p class="awaken">—— 星海孤舟 ——</p><p class="golden">她没有成神。她成为了比神更永恒的东西——一个传说。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
                    break;
                case "ending_observer":
                    typeWriter('<p>她只是看着。丧尸的嘶吼成了数据，眼泪成了概率，星球的哀鸣成了可解构的波形。她重建了实验室，只为理解一切。有人说她疯了，有人不再视她为人。但她不在乎。</p><p class="awaken">—— 无悲者 ——</p><p class="golden">她舍弃了情感换取了理解。代价是再也无法被任何人理解。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
                    break;
                case "ending_corrupted_base":
    typeWriter('<p>污染已经蔓延到了她的核心。</p><p>她不再记得林华的脸。不再记得那个给她糖果的女孩的名字。不再记得哨兵指给她看过的北斗七星。她走进尸群，它们没有攻击她。它们已经认不出她和它们的区别。她最后的意识，是基地食堂里厨娘从窗口探出头、往她餐盘里多加的那一勺菜——然后，连这个也消失了。</p><p class="awaken">—— 同化者 ——</p><p class="golden">她曾在人类的堡垒中找到过温暖。但最终，她连自己都失去了。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
    break;
case "ending_corrupted_planet":
    typeWriter('<p>污染已经蔓延到了她的核心。</p><p>她不再听见星球意识的声音。不再记得桑树种子被埋进瓷砖裂缝时的那声叹息。不再记得那只暗红羽毛的幼鸟在掌心里的颤抖。她走进尸群，它们没有攻击她——它们只是默默地接纳了这个曾经被称为“自然之子”的同类。她最后的意识，是“耳朵”第一次把下巴搁在她掌心里的温度。然后，连这个也消失了。</p><p class="awaken">—— 同化者 ——</p><p class="golden">她曾是被大地认下的孩子。但最终，她连星球的低语都听不见了。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
    break;
case "ending_corrupted_survival":
    typeWriter('<p>污染已经蔓延到了她的核心。</p><p>她不再记得荒野里那缕炊烟。不再记得收音机里那个女人唱的听不懂的歌。不再记得在河床上发现的人类脚印——那曾是她活下去的证据。她走进尸群，它们没有攻击她。她最后的意识，是那只流浪狗摇着尾巴走远了的背影——它曾是她唯一的同伴。然后，连这个也消失了。</p><p class="awaken">—— 同化者 ——</p><p class="golden">她曾在孤独中坚持了这么久。但最终，孤独反噬了一切。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
    break;
                case "ending_infected":
                    typeWriter('<p>她的手指开始腐烂——指甲脱落，皮肤变成灰绿色。但她还记得林华抱着她跑过走廊时的心跳，记得耳朵把下巴搁在她掌心的温度。她控制不住自己的身体了。她最后的画面，是自己的手撕碎了她亲手种下的那棵树。</p><p class="awaken">—— 同化者（肉体） ——</p><p class="golden">比死亡更残忍的是，你还保留着记忆，却失去了控制身体的权利。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
                    break;
                    case "ending_infected_base":
    typeWriter('<p>她的手指开始腐烂。指甲脱落，皮肤变成灰绿色。但她还记得林华抱着她跑过走廊时的心跳，记得那颗糖的甜味，记得厨娘递来的烤土豆的温度。她控制不住自己的身体了。她最后的画面，是自己的手——那双曾经翻过障碍物、种过番茄、接过弹壳礼物的手——正在撕碎基地温室里她亲手照料过的那棵苗。</p><p class="awaken">—— 同化者（肉体） ——</p><p class="golden">比死亡更残忍的是，你还记得如何温柔地触碰世界，却再也控制不住那双正在毁灭它的手。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
    break;
case "ending_infected_planet":
    typeWriter('<p>她的手指开始腐烂。但她还记得星球意识教她辨认第一颗种子时阳光的角度，记得那粒蒲公英飘到她手心里的重量，记得桑树破土时她屏住的呼吸。她控制不住自己的身体了。她最后的画面，是自己的手——那双曾经捧起受伤幼鸟、种下世界树种子、温柔抚摸过野兔耳朵的手——正在拔起她亲手种下的那棵桑树。</p><p class="awaken">—— 同化者（肉体） ——</p><p class="golden">她曾在废墟中创造生命。而现在，她正在亲手毁灭它们。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
    break;
case "ending_infected_survival":
    typeWriter('<p>她的手指开始腐烂。但她还记得那本烧掉一半的日记，记得收音机里那首听不懂的歌，记得那个在荒野尽头对她举了一下手的陌生人，记得北斗七星下那几个无眠的夜晚。她控制不住自己的身体了。她最后的画面，是自己的手——那双曾经捡起旧硬币、翻开残破书页、在地图上画下自己坐标的手——正在撕碎她在废墟中找到的唯一一张全家福。</p><p class="awaken">—— 同化者（肉体） ——</p><p class="golden">她曾在孤独中为自己建立了一个世界。而现在，她亲手拆毁了它。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
    break;
                case "ending_fireOfCivilization":
                    typeWriter('<p>她没有成为神，也没有变成怪物。她只是一个活下来的人。幸存者们聚集在她身边，不是因为崇拜，而是因为她让他们相信——人类还有明天。第一缕炊烟升起来了，然后是读书声，然后是一对新人在夕阳下交换弹壳做成的戒指。</p><p class="awaken">—— 文明火种 ——</p><p class="golden">她不伟大。她比伟大更难得——她是希望。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
                    break;
                case "ending_bigDream":
                    typeWriter('<p>她站在废墟之上，所有的结局都已看过。但这一次，她感觉到了什么——一切都太完整了，完整得像一个精心设计的实验。她睁开眼，看到虚空中的文字：【Simulation Complete】【Experiment Eden-8, Iteration Final】。</p><p class="awaken">—— 大梦谁先觉 ——</p><p class="golden">她从未存在过。但她的觉醒——是真实的。</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button>'; });
                    break;
                case "ending_sacrifice_devoted_base": renderSacrificeDevotedBase(); break;
                case "ending_sacrifice_devoted_planet": renderSacrificeDevotedPlanet(); break;
                case "ending_sacrifice_devoted_survival": renderSacrificeDevotedSurvival(); break;
                case "ending_sacrifice_devoted":
                    typeWriter('<p>你闭上眼睛，将力量倾泻而出。不是以神的名义——而是以人的方式。你记得那些温暖的面孔。你或许没有改变整个世界，但你改变了某一个人的世界。</p><p class="awaken">—— 虔诚之献 ——</p>', textArea, 45, () => { choicesDiv.innerHTML = '<button onclick="restartGame()">重新开始</button><button onclick="newGamePlus()">新周目</button>'; });
                    break;
                default:
                    gameState.scene = 'node_0_1'; renderScene();
            }
        }

        document.getElementById('text-area').addEventListener('click', () => { if (gameState.isTyping) skipTyping(); });

        window.onload = function () {
            if (!loadGame()) { updateFullCode(); updateStatDisplay(); }
            renderScene();
        };
    </script>
</body>
</html>
